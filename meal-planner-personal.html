<!DOCTYPE html>
<html lang="zh" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>今日食谱</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@300;400;500&family=Lora:ital,wght@0,400;0,600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f2ede8;--card:#faf7f4;--ink:#3d3530;--sub:#8a7e76;--faint:#b8ada5;--sel:#8a7060;--selb:#f0e8e2;--ok:#6a8a72;--okb:#e2ede4;--rose:#a07878;--roseb:#f0e4e4;--line:#ddd5cc;--shad:0 2px 12px rgba(80,60,50,.08);--hdr:#4a3e38;--hfg:#f7f2ee;--sf:'Noto Serif SC',serif;--ss:'Noto Sans SC','Inter',sans-serif;--sef:Lora,serif;--sen:'Inter',sans-serif}
[data-theme=dark]{--bg:#1e1a18;--card:#2a2420;--ink:#ede5dc;--sub:#9a8e85;--faint:#5a5048;--sel:#b09080;--selb:#3a2e28;--ok:#7aaa82;--okb:#1a2e1e;--rose:#c09090;--roseb:#2e1e1e;--line:#3a3028;--shad:0 2px 12px rgba(0,0,0,.4);--hdr:#141210;--hfg:#ede5dc}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ss);background:var(--bg);color:var(--ink);padding-bottom:68px;-webkit-tap-highlight-color:transparent}
/* Header */
.hdr{background:var(--hdr);color:var(--hfg);padding:14px 14px 18px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;right:-24px;top:-24px;width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.06);pointer-events:none}
.hdr-row{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;position:relative;z-index:1}
.hdr-l{flex:1;min-width:0}
.hdate{font-size:10px;letter-spacing:.8px;opacity:.55;margin-bottom:2px}
.htitle{font-size:20px;font-weight:700;line-height:1.2;margin-bottom:2px}
.hsub{font-size:10px;opacity:.45}
.hbtns{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.hbtn{height:27px;min-width:27px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.09);color:var(--hfg);font-size:12px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;padding:0 9px;font-family:inherit;font-weight:500;white-space:nowrap}
.hbtn:active{opacity:.65}
/* Card */
.card{background:var(--card);margin:10px 10px 0;border-radius:14px;padding:13px;box-shadow:var(--shad);border:1px solid var(--line)}
.ctitle{font-size:13px;font-weight:600;margin-bottom:11px;display:flex;align-items:center;gap:6px}
.ctitle::before{content:'';width:3px;height:13px;background:var(--sel);border-radius:2px;flex-shrink:0}
.srow{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:8px}
.srow:last-child{margin-bottom:0}
.lbl{font-size:12px;color:var(--sub);flex-shrink:0;font-weight:500}
.lblsm{font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:500}
/* Counter */
.counter{display:flex;align-items:center;gap:8px}
.cbtn{width:26px;height:26px;border-radius:50%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cbtn:active{background:var(--selb);border-color:var(--sel)}
.cval{font-size:16px;font-weight:600;min-width:20px;text-align:center}
/* Toggle */
.tg{display:flex;gap:4px}
.tgb{padding:4px 10px;border-radius:16px;border:1.5px solid var(--line);background:transparent;font-size:12px;font-family:inherit;color:var(--sub);cursor:pointer}
.tgb.on{background:var(--sel);color:#fff;border-color:var(--sel)}
/* Meal rows */
.mrows{display:flex;flex-direction:column;gap:5px;margin-top:4px;width:100%}
.mrow{display:flex;align-items:center;gap:7px}
.mchk{width:32px;height:32px;border-radius:9px;border:1.5px solid var(--line);background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0;user-select:none;transition:background .15s,border-color .15s}
.mchk.on{background:var(--sel);border-color:var(--sel)}
.mlbl{font-size:12px;color:var(--sub);font-weight:500;flex-shrink:0;min-width:30px}
.ctg{display:flex;gap:3px;margin-left:auto}
.ctgb{padding:3px 8px;border-radius:11px;border:1.5px solid var(--line);background:transparent;font-size:11px;font-family:inherit;color:var(--sub);cursor:pointer;white-space:nowrap}
.ctgb.on{background:var(--sel);color:#fff;border-color:var(--sel)}
.mrow.off .mlbl,.mrow.off .ctg{opacity:.28;pointer-events:none}
/* Switch */
.sw{width:44px;height:25px;border-radius:13px;background:var(--line);cursor:pointer;position:relative;flex-shrink:0;transition:background .22s}
.sw.on{background:var(--sel)}
.swk{position:absolute;top:2.5px;left:2.5px;width:20px;height:20px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.15);transition:transform .22s}
.sw.on .swk{transform:translateX(19px)}
/* Badges */
.sbadge{background:var(--okb);color:var(--ok);border-radius:9px;padding:3px 8px;font-size:11px;font-weight:500}
.jbadge{background:var(--roseb);color:var(--rose);border-radius:9px;padding:3px 8px;font-size:11px;font-weight:500}
/* Taboos */
.tchips{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.tchip{display:flex;align-items:center;gap:3px;background:var(--bg);color:var(--sub);border-radius:16px;padding:3px 8px;font-size:11px;cursor:pointer;border:1.5px solid var(--line);user-select:none}
.tchip.on{background:var(--sel);color:#fff;border-color:var(--sel)}
/* Input */
.ci{width:100%;border:1.5px solid var(--line);border-radius:9px;padding:7px 10px;font-size:12px;font-family:inherit;color:var(--ink);background:var(--bg);outline:none;margin-top:4px;resize:none}
.ci:focus{border-color:var(--sel)}
.ci::placeholder{color:var(--faint)}
/* Gen btn */
.gbtn{display:block;margin:10px 10px 0;width:calc(100% - 20px);background:var(--sel);color:#fff;border:none;border-radius:13px;padding:13px 16px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 14px rgba(138,112,96,.25)}
.gbtn:active{opacity:.85}
.gbtn:disabled{opacity:.45;cursor:not-allowed}
/* Results */
.res{padding:10px}
.tipbox{background:var(--okb);border-left:3px solid var(--ok);border-radius:0 9px 9px 0;padding:8px 12px;margin-bottom:10px;font-size:12px;color:var(--ok);line-height:1.6}
.nbar{background:var(--card);border-radius:12px;border:1px solid var(--line);padding:11px;margin-bottom:10px}
.ntit{font-size:11px;font-weight:600;margin-bottom:8px;color:var(--sub);letter-spacing:.5px}
.nitems{display:flex;gap:5px}
.ni{flex:1;text-align:center;background:var(--bg);border-radius:9px;padding:7px 4px}
.nv{font-size:13px;font-weight:700;color:var(--sel)}
.nl{font-size:10px;color:var(--sub);margin-top:2px}
.msec{margin-bottom:14px}
.mhd{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mico{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.mico.B{background:#f5eddf}.mico.L{background:#deeade}.mico.D{background:#dde4ee}
[data-theme=dark] .mico.B{background:#302a1e}[data-theme=dark] .mico.L{background:#1a2e1e}[data-theme=dark] .mico.D{background:#1a2030}
.mnm{font-size:14px;font-weight:600}
.ctag{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--selb);color:var(--sel);margin-left:5px;vertical-align:middle}
/* Dish card */
.dc{background:var(--card);border-radius:12px;border:1px solid var(--line);overflow:hidden;margin-bottom:7px;transition:opacity .3s}
.dc.busy{opacity:.35;pointer-events:none}
.dh{padding:10px 12px 8px;display:flex;align-items:flex-start;gap:6px}
.dhn{flex:1;cursor:pointer;min-width:0}
.dt{font-size:13px;font-weight:600;color:var(--ink);line-height:1.35;word-break:break-word}
.dtags{display:flex;gap:3px;flex-wrap:wrap;margin-top:3px}
.dtag{font-size:10px;padding:2px 6px;border-radius:6px;background:var(--selb);color:var(--sel)}
.dtag.g{background:var(--okb);color:var(--ok)}
.dtag.r{background:var(--roseb);color:var(--rose);font-weight:600}
.das{display:flex;align-items:center;gap:4px;flex-shrink:0;padding-top:1px}
.dexp{font-size:10px;color:var(--faint);cursor:pointer;padding:4px;user-select:none;transition:transform .2s}
.dexp.open{transform:rotate(180deg)}
.dswp{font-size:11px;padding:4px 8px;border-radius:7px;border:1.5px solid var(--line);background:var(--bg);color:var(--sub);cursor:pointer;white-space:nowrap;font-family:inherit}
.dswp:active{border-color:var(--sel);color:var(--sel)}
.dswp:disabled{opacity:.4}
.db{display:none;padding:0 12px 10px;border-top:1px solid var(--line)}
.db.open{display:block}
.dsec{font-size:10px;letter-spacing:.8px;color:var(--faint);margin:8px 0 5px;text-transform:uppercase}
.inglist{display:flex;flex-wrap:wrap;gap:4px}
.ingchip{font-size:11px;padding:3px 8px;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--ink)}
.stps{list-style:none;counter-reset:s}
.stps li{counter-increment:s;display:flex;gap:8px;font-size:12px;line-height:1.6;color:var(--sub);margin-bottom:5px}
.stps li::before{content:counter(s);display:flex;align-items:center;justify-content:center;width:18px;height:18px;min-width:18px;border-radius:50%;background:var(--selb);color:var(--sel);font-size:10px;font-weight:600;margin-top:2px}
/* Confirm */
.cfbtn{display:none;width:100%;margin-bottom:10px;background:var(--ok);color:#fff;border:none;border-radius:12px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.cfbtn.show{display:block}
.cfbtn:active{opacity:.85}
.cfbtn:disabled{opacity:.6}
/* Loading */
.lbox{text-align:center;padding:32px 16px}
.dots{display:flex;justify-content:center;gap:6px;margin-bottom:12px}
.dot{width:7px;height:7px;border-radius:50%;background:var(--sel);animation:bnc 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bnc{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.ltxt{font-size:12px;color:var(--sub)}
/* Sep */
.sep{height:1px;background:var(--line);margin:3px 0 10px}
/* Shop */
.shopcard{background:var(--card);border-radius:13px;border:1px solid var(--line);overflow:hidden;margin-bottom:10px}
.shophead{background:var(--hdr);color:var(--hfg);padding:11px 12px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.shophtit{font-size:13px;font-weight:600;flex:1}
.shopbadge{font-size:10px;opacity:.75;background:rgba(255,255,255,.15);padding:2px 7px;border-radius:8px;white-space:nowrap}
.shopab{font-size:11px;padding:3px 8px;border-radius:8px;border:1.5px solid rgba(255,255,255,.3);background:rgba(255,255,255,.12);color:var(--hfg);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;flex-shrink:0}
.shopbody{padding:10px 12px}
.shopcat{margin-bottom:10px}.shopcat:last-child{margin-bottom:0}
.shopchdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;padding-bottom:4px;border-bottom:1px dashed var(--line)}
.shopctit{font-size:10px;letter-spacing:.8px;color:var(--sub);font-weight:500}
.shopcb{font-size:11px;padding:2px 7px;border-radius:7px;border:1.5px solid var(--sel);background:var(--selb);color:var(--sel);cursor:pointer;white-space:nowrap;font-family:inherit;font-weight:500;user-select:none}
.shopcb:hover{background:var(--sel);color:#fff}
.shopcb.done{border-color:var(--line);background:var(--bg);color:var(--sub)}
.shopitems{display:flex;flex-wrap:wrap;gap:5px}
.shopitem{display:flex;align-items:center;gap:5px;background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:5px 8px;cursor:pointer;font-size:11px;user-select:none}
.shopitem.chk{opacity:.35;text-decoration:line-through}
.shopck{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.shopitem.chk .shopck{background:var(--ok);border-color:var(--ok);color:#fff}
.shopamt{font-size:10px;color:var(--faint)}
.shophint{margin-top:8px;text-align:center;font-size:10px;color:var(--faint)}
/* Translate overlay */
.tov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px)}
.tbox{background:var(--card);border-radius:14px;padding:24px 28px;text-align:center}
.tbox p{font-size:13px;color:var(--sub);margin-top:10px}
/* Pages + Nav */
.page{display:none}.page.active{display:block}
.bnav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0)}
.nbtn{flex:1;padding:8px 0 10px;border:none;background:transparent;cursor:pointer;font-size:10px;color:var(--faint);display:flex;flex-direction:column;align-items:center;gap:2px;font-family:inherit}
.ni{font-size:18px;line-height:1}
.nbtn.on{color:var(--sel)}
/* History */
.histwrap{padding:10px 10px 0}
.histhdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.histtit{font-size:14px;font-weight:600}
.histclr{font-size:11px;color:var(--faint);cursor:pointer;text-decoration:underline}
.calnav{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.calnb{width:30px;height:30px;border-radius:50%;border:1.5px solid var(--line);background:var(--bg);color:var(--ink);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.calnb:active{background:var(--selb)}
.calmo{font-size:13px;font-weight:600}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:10px}
.calwd{text-align:center;font-size:9px;color:var(--faint);padding:3px 0}
.calday{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:1.5px solid transparent;user-select:none}
.calday.empty{cursor:default;pointer-events:none}
.calday.has{background:var(--selb)}.calday.has .cdn{color:var(--sel);font-weight:600}
.calday.today{border-color:var(--ok)!important}.calday.today .cdn{color:var(--ok);font-weight:700}
.calday.sel{background:var(--sel)!important;border-color:var(--sel)!important}.calday.sel .cdn{color:#fff!important}
.cdn{font-size:11px;color:var(--ink)}
.cdot{width:3px;height:3px;border-radius:50%;background:var(--sel);margin-top:1px}
.calday.sel .cdot{background:rgba(255,255,255,.8)}
.caldet{background:var(--card);border-radius:12px;border:1px solid var(--line);overflow:hidden;margin-bottom:10px}
.caldethdr{padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:6px}
.caldetdate{font-size:12px;font-weight:600;flex:1}
.caldetbody{padding:10px 12px}
/* History dish */
.hmb{margin-bottom:11px}.hmb:last-child{margin-bottom:0}
.hmmhdr{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.hmmico{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.hmmico.B{background:#f5eddf}.hmmico.L{background:#deeade}.hmmico.D{background:#dde4ee}
[data-theme=dark] .hmmico.B{background:#302a1e}[data-theme=dark] .hmmico.L{background:#1a2e1e}[data-theme=dark] .hmmico.D{background:#1a2030}
.hmmlbl{font-size:12px;font-weight:600;flex:1}
.hmctag{font-size:10px;padding:1px 6px;border-radius:6px;background:var(--selb);color:var(--sel);margin-left:4px}
.hmdish{background:var(--bg);border:1px solid var(--line);border-radius:9px;margin-bottom:4px;overflow:hidden}
.hmdishhdr{padding:6px 10px;display:flex;align-items:center;gap:6px;cursor:pointer;user-select:none}
.hmdishnm{font-size:12px;font-weight:600;flex:1;color:var(--ink)}
.hmexp{font-size:9px;color:var(--faint);transition:transform .2s}
.hmexp.open{transform:rotate(180deg)}
.hmdishbody{display:none;padding:0 10px 8px;border-top:1px solid var(--line)}
.hmdishbody.open{display:block}
.hmsec{font-size:9px;letter-spacing:.7px;color:var(--faint);margin:6px 0 4px;text-transform:uppercase}
.hming{display:flex;flex-wrap:wrap;gap:3px}
.hmingchip{font-size:10px;padding:2px 7px;background:var(--card);border:1px solid var(--line);border-radius:7px;color:var(--ink)}
.hmstps{list-style:none;counter-reset:hs}
.hmstps li{counter-increment:hs;display:flex;gap:6px;font-size:11px;line-height:1.55;color:var(--sub);margin-bottom:4px}
.hmstps li::before{content:counter(hs);display:flex;align-items:center;justify-content:center;width:15px;height:15px;min-width:15px;border-radius:50%;background:var(--selb);color:var(--sel);font-size:9px;font-weight:600;margin-top:2px}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-row">
    <div class="hdr-l">
      <div class="hdate" id="hDate"></div>
      <div class="htitle" id="hTitle"></div>
      <div class="hsub" id="hSub"></div>
    </div>
    <div class="hbtns">
      <button class="hbtn" id="darkBtn" onclick="tDark()">🌙</button>
      <button class="hbtn" id="langBtn" onclick="tLang()">EN</button>
    </div>
  </div>
</div>
<div class="page active" id="pagePlan">
  <div class="card">
    <div class="ctitle" id="lPref"></div>
    <div class="srow" style="flex-direction:column;align-items:flex-start;gap:5px">
      <span class="lbl" id="lPlanMeals"></span>
      <div class="mrows">
        <div class="mrow" id="mrow_B"><div class="mchk on" id="mchk_B" onclick="tMeal('B')">🌅</div><span class="mlbl" id="mlbl_B"></span><div class="ctg"><button class="ctgb on" id="ct_B_zh" onclick="sCuisine('B','zh')"></button><button class="ctgb" id="ct_B_en" onclick="sCuisine('B','en')"></button></div></div>
        <div class="mrow" id="mrow_L"><div class="mchk on" id="mchk_L" onclick="tMeal('L')">☀️</div><span class="mlbl" id="mlbl_L"></span><div class="ctg"><button class="ctgb on" id="ct_L_zh" onclick="sCuisine('L','zh')"></button><button class="ctgb" id="ct_L_en" onclick="sCuisine('L','en')"></button></div></div>
        <div class="mrow" id="mrow_D"><div class="mchk on" id="mchk_D" onclick="tMeal('D')">🌙</div><span class="mlbl" id="mlbl_D"></span><div class="ctg"><button class="ctgb on" id="ct_D_zh" onclick="sCuisine('D','zh')"></button><button class="ctgb" id="ct_D_en" onclick="sCuisine('D','en')"></button></div></div>
      </div>
    </div>
    <div class="srow"><span class="lbl" id="lAdults"></span><div class="counter"><button class="cbtn" onclick="adj('adults',-1)">−</button><span class="cval" id="vAdults">3</span><button class="cbtn" onclick="adj('adults',1)">+</button></div></div>
    <div class="srow"><span class="lbl" id="lKids"></span><div class="counter"><button class="cbtn" onclick="adj('kids',-1)">−</button><span class="cval" id="vKids">0</span><button class="cbtn" onclick="adj('kids',1)">+</button></div></div>
    <div class="srow"><span class="lbl" id="lTime"></span><div class="tg"><button class="tgb on" id="tbQ" onclick="sTime('Q')"></button><button class="tgb" id="tbR" onclick="sTime('R')"></button></div></div>
    <div class="srow"><div style="flex:1;min-width:0;padding-right:8px"><div class="lbl" id="lBold"></div><div style="font-size:10px;color:var(--faint);margin-top:2px" id="lBoldSub"></div></div><div class="sw" id="richSw" onclick="tRich()"><div class="swk"></div></div></div>
    <div class="srow"><span class="lbl" id="lSeason"></span><div style="display:flex;gap:4px;flex-wrap:wrap;justify-content:flex-end"><div class="sbadge" id="sBadge"></div><div class="jbadge" id="jBadge" style="display:none"></div></div></div>
    <div style="margin-bottom:9px"><div class="lblsm" id="lTaboo"></div><div class="tchips" id="tchips"></div></div>
    <div><div class="lblsm" id="lSpec"></div><textarea class="ci" id="specReq" rows="2"></textarea></div>
  </div>
  <button class="gbtn" id="genBtn" onclick="gen()"></button>
  <div class="res" id="res"></div>
</div>
<div class="page" id="pageHistory">
  <div class="histwrap">
    <div class="histhdr"><div class="histtit" id="lHistTit"></div><span class="histclr" id="histClr" onclick="clrHist()"></span></div>
    <div id="histList"></div>
  </div>
</div>
<div class="bnav">

/* ── API ── */
function getKey(){return localStorage.getItem('ds_key')||'';}
async function api(prompt,maxT){
  const key=getKey();
  if(!key)throw new Error('NO_KEY');
  const r=await fetch('https://api.deepseek.com/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'deepseek-chat',max_tokens:maxT||4000,messages:[{role:'user',content:prompt}]})
  });
  const dat=await r.json();
  if(dat.error)throw new Error('Deepseek: '+JSON.stringify(dat.error));
  if(!dat.choices||!dat.choices.length)throw new Error('No content: '+JSON.stringify(dat).slice(0,200));
  return dat.choices[0].message.content.replace(/```json|```/g,'').trim();
}

function getJq(){var now=new Date(),best=null,mD=Infinity,mF=Infinity,i,j,d,df;for(i=0;i<JQ.length;i++){j=JQ[i];d=new Date(now.getFullYear(),j.m-1,j.d);df=(now-d)/864e5;if(df>=0&&df<16&&df<mD){mD=df;best=j;}}if(!best){for(i=0;i<JQ.length;i++){j=JQ[i];d=new Date(now.getFullYear(),j.m-1,j.d);df=(d-now)/864e5;if(df>=0&&df<mF){mF=df;best=j;}}}return best;}

  }else{

async function transPlan(){
  if(!plan)return;var l=L();
  if(plan.tr&&plan.tr[lang]){plan.data=plan.tr[lang];renderRes(plan.data,plan.sel);return;}
  var ov=document.createElement('div');ov.className='tov';ov.innerHTML='<div class="tbox"><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div><p>'+l.trans+'</p></div>';
  document.body.appendChild(ov);
  try{
    var SEP='|||',txts=[],src=plan.data,ss=[];
    txts.push(src.season_tip||'');txts.push((src.nutrition&&src.nutrition.balanced)||'');
    plan.sel.forEach(function(k){var m=src.meals&&src.meals[k];if(!m||!m.dishes)return;m.dishes.forEach(function(d){txts.push(d.name||'');(d.tags||[]).forEach(function(t){txts.push(t);});(d.ingredients||[]).forEach(function(i){txts.push(i.name||'');});(d.steps||[]).forEach(function(s){txts.push(s||'');});});});
    if(src.shopping_list){Object.keys(src.shopping_list).forEach(function(cat){var its=src.shopping_list[cat];if(!its||!its.length)return;its.forEach(function(it,ii){txts.push(it.name||'');ss.push({cat:cat,ii:ii});});});}
    var toEn=lang==='en';
    var p=toEn?'Translate Chinese to English, "|||" separated, return ONLY translations same count:\n\n'+txts.join(SEP):'英译中，"|||"分隔，只返回翻译，数量相同：\n\n'+txts.join(SEP);
    var raw=await api(p,3000);
    var parts=raw.split(SEP).map(function(s){return s.trim();});
    var tr=JSON.parse(JSON.stringify(src)),pi=0;
    function nx(){return pi<parts.length?parts[pi++]:'';}
    tr.season_tip=nx();if(tr.nutrition)tr.nutrition.balanced=nx();

    box.style.background='#2a2420';
    box.querySelector('div').style.color='#ede5dc';
    var inp=ov.querySelector('#keyInput');
    inp.style.background='#1e1a18';inp.style.color='#ede5dc';inp.style.borderColor='#3a3028';
  }
  document.body.appendChild(ov);
  setTimeout(function(){ov.querySelector('#keyInput').focus();},100);
}
async function saveKey(){
  var val=document.getElementById('keyInput').value.trim();
  var errEl=document.getElementById('keyErr');
  if(!val||!val.startsWith('sk-')){errEl.textContent='请输入有效的 API Key（以 sk- 开头）';return;}
  errEl.textContent='验证中…';
  // Quick validation call
  try{
    const r=await fetch('https://api.deepseek.com/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+val},
      body:JSON.stringify({model:'deepseek-chat',max_tokens:5,messages:[{role:'user',content:'hi'}]})
    });
    const d=await r.json();
    if(d.error&&d.error.code!=='insufficient_quota'){errEl.textContent='Key 无效: '+d.error.message;return;}
  }catch(e){errEl.textContent='网络错误，请检查连接';return;}
  localStorage.setItem('ds_key',val);
  var ov=document.getElementById('setupOv');
  if(ov)document.body.removeChild(ov);
  updateGenBtn();
}
function checkKeyOnLoad(){if(!getKey())showSetup();}
/* Boot */
applyLang();
checkKeyOnLoad();



</script>
